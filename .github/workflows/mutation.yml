name: Mutation

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: mutation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            dist
          key: build-${{ github.sha }}

  mutation-incremental:
    name: Mutation Testing (Incremental)
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/restore-build
      - name: Restore pnpm virtual store symlinks
        run: pnpm install --frozen-lockfile
      - name: Restore Stryker incremental cache
        uses: actions/cache@v5
        with:
          path: reports/stryker-incremental.json
          key: stryker-incremental-${{ github.sha }}
          restore-keys: |
            stryker-incremental-
      - name: Run mutation on changed files
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD | grep -E '^src/' | paste -sd,)
          [ -n "$CHANGED" ] && pnpm exec stryker run --mutate "$CHANGED" || echo "No src files changed"

  mutation:
    name: Mutation Testing
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/restore-build
      - name: Restore pnpm virtual store symlinks
        run: pnpm install --frozen-lockfile
      - name: Restore Stryker incremental cache
        uses: actions/cache@v5
        with:
          path: reports/stryker-incremental.json
          key: stryker-incremental-${{ github.sha }}
          restore-keys: |
            stryker-incremental-
      - name: Full mutation scan
        run: pnpm run test:mutation
      - name: Upload mutation report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutation-report-${{ github.event_name }}
          path: |
            reports/stryker-report.html
            reports/stryker-incremental.json
          retention-days: 30

  mutation-nightly-notify:
    name: Mutation Nightly Slack Notification
    needs: mutation
    if: >-
      always() &&
      github.event_name == 'schedule' &&
      needs.mutation.result == 'failure'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":rotating_light: *Risoluto Mutation Pipeline Failed*\n\n*Failed jobs:* mutation\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n*Branch:* `${{ github.ref_name }}`\n*Triggered:* ${{ github.event_name }}"
            }
