name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Phase 1: Build & Lint ──────────────────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run format:check

  # ── Phase 2: Test & Coverage ───────────────────────────────────────
  test:
    name: Test & Coverage
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test -- --reporter=verbose --coverage
      - name: Dead code analysis
        run: npx knip
      - name: Duplicate code analysis
        run: npx jscpd
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Phase 3: Security & Quality (parallel) ─────────────────────────
  gitleaks:
    name: Gitleaks
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: Semgrep
    needs: build
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6
      - run: semgrep scan --config auto --config p/typescript --error

  codeql:
    name: CodeQL
    needs: build
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4

  sonarcloud:
    name: SonarCloud
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: coverage/
      - uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Phase 4: Verify (main only) ───────────────────────────────────
  docker-build:
    name: Docker Build
    needs: [test, gitleaks, semgrep]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t symphony-orchestrator-service .

  integration:
    name: Integration Tests
    if: github.ref == 'refs/heads/main'
    needs: [test, gitleaks, semgrep]
    runs-on: ubuntu-latest
    env:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:integration

  # ── Phase 5: E2E Tests ───────────────────────────────────────────────
  e2e-smoke:
    name: E2E Smoke (${{ matrix.shard }}/${{ strategy.job-total }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: Run E2E smoke tests (shard ${{ matrix.shard }})
        run: npx playwright test --project=smoke --shard=${{ matrix.shard }}/${{ strategy.job-total }}
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 14

  e2e-smoke-report:
    name: E2E Smoke Report
    if: always()
    needs: e2e-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Download all blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true
      - name: Merge reports
        run: npx playwright merge-reports --reporter=html all-blob-reports
      - uses: actions/upload-artifact@v7
        with:
          name: e2e-smoke-html-report
          path: playwright-report/
          retention-days: 14

  # ── Phase 6: Mutation Testing (weekly only) ─────────────────────────
  mutation:
    name: Mutation Testing
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:mutation

  # ── Gate: single required check for branch protection ──────────────
  build-and-test:
    name: build-and-test
    if: always()
    needs: [build, test, gitleaks, semgrep, codeql, docker-build, e2e-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.build.result }}" != "success" ] ||
             [ "${{ needs.test.result }}" != "success" ] ||
             [ "${{ needs.gitleaks.result }}" != "success" ] ||
             [ "${{ needs.semgrep.result }}" != "success" ] ||
             [ "${{ needs.codeql.result }}" != "success" ] ||
             [ "${{ needs.docker-build.result }}" != "success" ] ||
             [ "${{ needs.e2e-smoke.result }}" != "success" ]; then
            echo "❌ One or more required jobs failed"
            exit 1
          fi
          echo "✅ All required jobs passed"
