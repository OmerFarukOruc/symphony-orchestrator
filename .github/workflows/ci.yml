name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "LICENSE", ".vscode/**"]
  pull_request:
    # No paths-ignore on PRs — every PR gets full CI regardless of file types.
    branches: [main]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      nightly_validation_mode:
        description: "Intentional validation failure target"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - fullstack-fail
          - visual-fail
          - live-fail
      disable_linear_write:
        description: "Disable live Linear mutations for this run"
        required: false
        default: false
        type: boolean
      disable_r2_upload:
        description: "Disable R2 artifact upload for this run"
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

# Force all JavaScript-based actions to run on Node 24 instead of their
# default Node 20, which GitHub will deprecate on 2026-06-02.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Phase 1: Install, Build & Cache ──────────────────────────────────
  # Single pnpm install + build. All downstream jobs restore from cache.
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            dist
          key: build-${{ github.sha }}

  # ── Phase 2: Quality Gates (parallel, all use cached build) ──────────
  lint:
    name: Lint & Format
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/restore-build
      - run: pnpm run lint
      - run: pnpm run format:check

  test:
    name: Test (Node ${{ matrix.node-version }})
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      # Node 24: restore cached build. Node 22: fresh install for native compat.
      - uses: actions/cache/restore@v5
        if: matrix.node-version == 24
        with:
          path: |
            node_modules
            dist
          key: build-${{ github.sha }}
      - run: pnpm install --frozen-lockfile
        if: matrix.node-version == 22
      # Shared pnpm store can hold a Node 24 binary from the Build job; force
      # a Node 22 rebuild so vitest loads an ABI-matching better-sqlite3.
      - run: pnpm rebuild better-sqlite3
        if: matrix.node-version == 22
      - run: pnpm exec vitest run --reporter=verbose --coverage
      - uses: actions/upload-artifact@v7
        if: always() && matrix.node-version == 24
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  frontend-test:
    name: Frontend Tests
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/restore-build
      - run: pnpm run test:frontend

  knip:
    name: Dead Code Analysis
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/restore-build
      - run: pnpm exec knip

  circular:
    name: Circular Dependency Check
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/restore-build
      - run: pnpm run circular

  typecheck:
    name: Type Check
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/restore-build
      - run: pnpm run typecheck
      - run: pnpm run typecheck:frontend
      - name: Type-check tests (informational — 316 pre-existing errors)
        run: pnpm run typecheck:tests
        continue-on-error: true

  # ── Phase 2: Security (parallel, independent of build) ───────────────
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4

  # ── Phase 3: E2E Smoke Tests (parallel, uses cached build) ──────────
  e2e-smoke:
    name: E2E Smoke (${{ matrix.shard }}/3)
    if: github.event_name != 'schedule'
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/restore-build
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium
      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium
      - name: Run E2E smoke tests (shard ${{ matrix.shard }})
        run: pnpm exec playwright test --project=smoke --shard=${{ matrix.shard }}/3
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 14

  e2e-smoke-report:
    name: E2E Smoke Report
    if: always() && needs.e2e-smoke.result != 'skipped'
    needs: e2e-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/restore-build
      - name: Download all blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true
      - name: Merge reports
        run: pnpm exec playwright merge-reports --reporter=html all-blob-reports
      - uses: actions/upload-artifact@v7
        with:
          name: e2e-smoke-html-report
          path: playwright-report/
          retention-days: 14

  # ── Phase 4: Docker Build & Verify ───────────────────────────────────
  docker-build:
    name: Docker Build & Smoke
    if: github.event_name != 'schedule'
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t risoluto-service .
      - name: Verify container structure
        run: |
          docker run --rm --entrypoint sh risoluto-service -c "
            node --version &&
            test -f dist/cli/index.js &&
            test -d node_modules &&
            echo 'Container structure verified'
          "

  # ── Phase 4: Integration (credentialless, all PRs) ──────────────────
  integration-pr:
    name: Integration Tests (PR)
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/restore-build
      - run: pnpm run test:integration

  # ── Phase 4: Integration (main only, with credentials) ─────────────
  integration:
    name: Integration Tests
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/restore-build
      - run: pnpm run test:integration

  # ── Phase 5: Nightly-Only Jobs (schedule + workflow_dispatch) ─────────
  fullstack-e2e:
    name: Fullstack E2E
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ${{ github.event_name == 'schedule' && fromJSON('["self-hosted","linux","nightly","real-data","playwright"]') || 'ubuntu-24.04' }}
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      RISOLUTO_NIGHTLY_ENV: fullstack-e2e
      NIGHTLY_VALIDATION_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.nightly_validation_mode || 'none' }}
      NIGHTLY_VALIDATION_JOB: fullstack-fail
      RISOLUTO_NIGHTLY_HTML_REPORT: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/restore-build
      - uses: ./.github/actions/prepare-nightly-vds
      - name: Validation fail switch
        run: node --import tsx scripts/nightly-validation-fail.ts
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium
      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium
      - name: Run fullstack E2E tests
        run: pnpm exec playwright test --config playwright.fullstack.config.ts
      - name: Write nightly manifest
        if: always()
        run: |
          mkdir -p "$RISOLUTO_NIGHTLY_ARTIFACT_ROOT"
          jq -n \
            --arg job "fullstack-e2e" \
            --arg runId "${{ github.run_id }}" \
            --arg sha "${{ github.sha }}" \
            --arg ref "$GITHUB_REF_NAME" \
            --arg runner "${{ runner.name }}" \
            --arg env "$RISOLUTO_NIGHTLY_ENV" \
            '{job:$job,runId:$runId,sha:$sha,ref:$ref,runner:$runner,environment:$env}' \
            > "$RISOLUTO_NIGHTLY_ARTIFACT_ROOT/nightly-manifest.json"
      - name: Upload test results
        if: always()
        id: upload-fullstack-report
        uses: actions/upload-artifact@v7
        with:
          name: fullstack-e2e-report-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
            test-results/playwright-fullstack-results.json
            ${{ env.RISOLUTO_NIGHTLY_ARTIFACT_ROOT }}/nightly-manifest.json
          retention-days: 30

  visual-regression:
    name: Visual Regression
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ${{ github.event_name == 'schedule' && fromJSON('["self-hosted","linux","nightly","real-data","playwright"]') || 'ubuntu-24.04' }}
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    env:
      RISOLUTO_NIGHTLY_ENV: visual-regression
      NIGHTLY_VALIDATION_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.nightly_validation_mode || 'none' }}
      NIGHTLY_VALIDATION_JOB: visual-fail
      RISOLUTO_NIGHTLY_HTML_REPORT: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/restore-build
      - uses: ./.github/actions/prepare-nightly-vds
      - name: Validation fail switch
        run: node --import tsx scripts/nightly-validation-fail.ts
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium
      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium
      - name: Run visual regression tests
        run: pnpm exec playwright test --project=visual
      - name: Write nightly manifest
        if: always()
        run: |
          mkdir -p "$RISOLUTO_NIGHTLY_ARTIFACT_ROOT"
          jq -n \
            --arg job "visual-regression" \
            --arg runId "${{ github.run_id }}" \
            --arg sha "${{ github.sha }}" \
            --arg ref "$GITHUB_REF_NAME" \
            --arg runner "${{ runner.name }}" \
            --arg env "$RISOLUTO_NIGHTLY_ENV" \
            '{job:$job,runId:$runId,sha:$sha,ref:$ref,runner:$runner,environment:$env}' \
            > "$RISOLUTO_NIGHTLY_ARTIFACT_ROOT/nightly-manifest.json"
      - name: Upload visual diffs
        if: always()
        id: upload-visual-report
        uses: actions/upload-artifact@v7
        with:
          name: visual-regression-diffs-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
            test-results/playwright-smoke-results.json
            ${{ env.RISOLUTO_NIGHTLY_ARTIFACT_ROOT }}/nightly-manifest.json
          retention-days: 30

  live-provider-smoke:
    name: Live Provider Smoke
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ${{ github.event_name == 'schedule' && fromJSON('["self-hosted","linux","nightly","real-data","providers"]') || 'ubuntu-24.04' }}
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    env:
      RISOLUTO_NIGHTLY_ENV: live-provider-smoke
      NIGHTLY_VALIDATION_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.nightly_validation_mode || 'none' }}
      NIGHTLY_VALIDATION_JOB: live-fail
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
      E2E_GITHUB_TOKEN: ${{ secrets.E2E_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/restore-build
      - uses: ./.github/actions/prepare-nightly-vds
      - name: Validation fail switch
        run: node --import tsx scripts/nightly-validation-fail.ts
      - name: Run live integration tests
        run: pnpm run test:integration:live
      - name: Write nightly manifest
        if: always()
        run: |
          mkdir -p "$RISOLUTO_NIGHTLY_ARTIFACT_ROOT"
          jq -n \
            --arg job "live-provider-smoke" \
            --arg runId "${{ github.run_id }}" \
            --arg sha "${{ github.sha }}" \
            --arg ref "$GITHUB_REF_NAME" \
            --arg runner "${{ runner.name }}" \
            --arg env "$RISOLUTO_NIGHTLY_ENV" \
            '{job:$job,runId:$runId,sha:$sha,ref:$ref,runner:$runner,environment:$env}' \
            > "$RISOLUTO_NIGHTLY_ARTIFACT_ROOT/nightly-manifest.json"
      - name: Upload live smoke manifest
        if: always()
        id: upload-live-smoke-manifest
        uses: actions/upload-artifact@v7
        with:
          name: live-provider-smoke-${{ github.sha }}
          path: ${{ env.RISOLUTO_NIGHTLY_ARTIFACT_ROOT }}/nightly-manifest.json
          retention-days: 30

  # ── Nightly Failure Intake ───────────────────────────────────────────
  nightly-linear-intake:
    name: Nightly Linear Intake
    needs: [fullstack-e2e, visual-regression, live-provider-smoke]
    if: >-
      always() &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
      (needs.fullstack-e2e.result == 'failure' ||
       needs.visual-regression.result == 'failure' ||
       needs.live-provider-smoke.result == 'failure')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      NIGHTLY_JOB_NAMES: fullstack-e2e,visual-regression,live-provider-smoke
      NIGHTLY_RESULT_FULLSTACK_E2E: ${{ needs.fullstack-e2e.result }}
      NIGHTLY_RESULT_VISUAL_REGRESSION: ${{ needs.visual-regression.result }}
      NIGHTLY_RESULT_LIVE_PROVIDER_SMOKE: ${{ needs.live-provider-smoke.result }}
      NIGHTLY_FAILED_JOB_FULLSTACK_E2E: ${{ needs.fullstack-e2e.result == 'failure' }}
      NIGHTLY_FAILED_JOB_VISUAL_REGRESSION: ${{ needs.visual-regression.result == 'failure' }}
      NIGHTLY_FAILED_JOB_LIVE_PROVIDER_SMOKE: ${{ needs.live-provider-smoke.result == 'failure' }}
      NIGHTLY_DISABLE_LINEAR_WRITE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.disable_linear_write || 'false' }}
      NIGHTLY_DISABLE_R2_UPLOAD: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.disable_r2_upload || 'false' }}
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
      LINEAR_PROJECT_SLUG: ${{ secrets.LINEAR_PROJECT_SLUG }}
      NIGHTLY_EVIDENCE_BASE_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      NIGHTLY_INTAKE_ARTIFACT_NAME: nightly-linear-intake-${{ github.sha }}
      NIGHTLY_HTML_ARTIFACT_NAME: ${{ needs.fullstack-e2e.result == 'failure' && format('fullstack-e2e-report-{0}', github.sha) || needs.visual-regression.result == 'failure' && format('visual-regression-diffs-{0}', github.sha) || '' }}
      PLAYWRIGHT_JSON_REPORT_PATHS: test-results/playwright-fullstack-results.json,test-results/playwright-smoke-results.json
      NIGHTLY_HTML_REPORT_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts
      NIGHTLY_TRACE_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts
      NIGHTLY_VIDEO_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts
      NIGHTLY_INTAKE_ARTIFACT_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts
      NIGHTLY_LINEAR_HISTORY_PATH: reports/nightly-linear-history.json
      LINEAR_NIGHTLY_CLOSED_STATE: ${{ secrets.LINEAR_NIGHTLY_CLOSED_STATE }}
      R2_HISTORY_KEY: nightly/history/linear-history.json
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore nightly recurrence history from R2
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.disable_r2_upload != 'true' }}
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_HISTORY_KEY: nightly/history/linear-history.json
        run: |
          if [ -z "$R2_ACCOUNT_ID" ] || [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ] || [ -z "$R2_BUCKET" ]; then
            echo '{"entries":{}}' > reports/nightly-linear-history.json
            exit 0
          fi
          mkdir -p reports
          node --import tsx scripts/nightly-history-r2.ts download reports/nightly-linear-history.json
      - name: Download fullstack artifact
        uses: actions/download-artifact@v8
        if: ${{ needs.fullstack-e2e.result == 'failure' }}
        with:
          name: fullstack-e2e-report-${{ github.sha }}
          path: reports/downloaded/fullstack
      - name: Download visual artifact
        uses: actions/download-artifact@v8
        if: ${{ needs.visual-regression.result == 'failure' }}
        with:
          name: visual-regression-diffs-${{ github.sha }}
          path: reports/downloaded/visual
      - name: Resolve downloaded nightly evidence paths
        run: |
          mkdir -p reports
          FULLSTACK_JSON=$(find reports/downloaded/fullstack -type f -name 'playwright-fullstack-results.json' 2>/dev/null | head -n 1 || true)
          VISUAL_JSON=$(find reports/downloaded/visual -type f -name 'playwright-smoke-results.json' 2>/dev/null | head -n 1 || true)
          HTML_INDEX=$(find reports/downloaded/fullstack reports/downloaded/visual -type f -path '*/playwright-report/index.html' 2>/dev/null | head -n 1 || true)
          PLAYWRIGHT_PATHS=""
          if [ -n "$FULLSTACK_JSON" ]; then
            PLAYWRIGHT_PATHS="$FULLSTACK_JSON"
          fi
          if [ -n "$VISUAL_JSON" ]; then
            if [ -n "$PLAYWRIGHT_PATHS" ]; then
              PLAYWRIGHT_PATHS="$PLAYWRIGHT_PATHS,$VISUAL_JSON"
            else
              PLAYWRIGHT_PATHS="$VISUAL_JSON"
            fi
          fi
          {
            echo "NIGHTLY_FULLSTACK_JSON_PATH=$FULLSTACK_JSON"
            echo "NIGHTLY_VISUAL_JSON_PATH=$VISUAL_JSON"
            echo "NIGHTLY_DOWNLOADED_HTML_DIR=${HTML_INDEX%/index.html}"
            echo "PLAYWRIGHT_JSON_REPORT_PATHS=$PLAYWRIGHT_PATHS"
          } >> "$GITHUB_ENV"
      - name: Build machine-readable nightly summary
        run: |
          mkdir -p reports
          node --import tsx scripts/nightly-evidence-links.ts reports/nightly-evidence-links.json
          node --import tsx scripts/nightly-failure-summary.ts reports/nightly-failure-summary.json
      - name: Publish nightly artifacts to R2
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.disable_r2_upload != 'true' }}
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          if [ -z "$R2_ACCOUNT_ID" ] || [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ] || [ -z "$R2_BUCKET" ] || [ -z "$R2_PUBLIC_BASE_URL" ]; then
            echo "R2 secrets not fully configured; skipping upload"
            exit 0
          fi
          mkdir -p reports
          INPUTS="summary=reports/nightly-failure-summary.json intake-schema=notes/nightly-failure-intake.schema.md"
          if [ -n "$NIGHTLY_DOWNLOADED_HTML_DIR" ] && [ -d "$NIGHTLY_DOWNLOADED_HTML_DIR" ]; then
            INPUTS="$INPUTS html=$NIGHTLY_DOWNLOADED_HTML_DIR"
          fi
          if [ -n "$NIGHTLY_FULLSTACK_JSON_PATH" ] && [ -f "$NIGHTLY_FULLSTACK_JSON_PATH" ]; then
            INPUTS="$INPUTS fullstack-json=$NIGHTLY_FULLSTACK_JSON_PATH"
          fi
          if [ -n "$NIGHTLY_VISUAL_JSON_PATH" ] && [ -f "$NIGHTLY_VISUAL_JSON_PATH" ]; then
            INPUTS="$INPUTS visual-json=$NIGHTLY_VISUAL_JSON_PATH"
          fi
          TRACE_FILE=$(find reports/downloaded -type f \( -name '*.zip' -o -name '*.trace' \) 2>/dev/null | head -n 1 || true)
          if [ -n "$TRACE_FILE" ]; then
            INPUTS="$INPUTS trace=$TRACE_FILE"
          fi
          VIDEO_FILE=$(find reports/downloaded -type f -name '*.webm' 2>/dev/null | head -n 1 || true)
          if [ -n "$VIDEO_FILE" ]; then
            INPUTS="$INPUTS video=$VIDEO_FILE"
          fi
          # shellcheck disable=SC2086
          node --import tsx scripts/upload-nightly-artifacts-r2.ts reports/nightly-r2-upload.json $INPUTS || true
          if [ -f reports/nightly-r2-upload.json ]; then
            NIGHTLY_HTML_REPORT_URL=$(node -e "const m=require('./reports/nightly-r2-upload.json'); const f=m.uploaded.find(x=>x.label==='html' && x.key.endsWith('/index.html')); console.log(f?f.url:'')")
            NIGHTLY_TRACE_URL=$(node -e "const m=require('./reports/nightly-r2-upload.json'); const f=m.uploaded.find(x=>x.label==='trace'); console.log(f?f.url:'')")
            NIGHTLY_VIDEO_URL=$(node -e "const m=require('./reports/nightly-r2-upload.json'); const f=m.uploaded.find(x=>x.label==='video'); console.log(f?f.url:'')")
            NIGHTLY_INTAKE_ARTIFACT_URL=$(node -e "const m=require('./reports/nightly-r2-upload.json'); const f=m.uploaded.find(x=>x.label==='summary'); console.log(f?f.url:'')")
            {
              echo "NIGHTLY_HTML_REPORT_URL=$NIGHTLY_HTML_REPORT_URL"
              echo "NIGHTLY_TRACE_URL=$NIGHTLY_TRACE_URL"
              echo "NIGHTLY_VIDEO_URL=$NIGHTLY_VIDEO_URL"
              echo "NIGHTLY_INTAKE_ARTIFACT_URL=$NIGHTLY_INTAKE_ARTIFACT_URL"
            } >> "$GITHUB_ENV"
          fi
      - name: Refresh nightly summary with resolved evidence URLs
        run: node --import tsx scripts/nightly-failure-summary.ts reports/nightly-failure-summary.json
      - name: Sync refreshed summary to R2
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.disable_r2_upload != 'true' }}
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          if [ -z "$R2_ACCOUNT_ID" ] || [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ] || [ -z "$R2_BUCKET" ] || [ -z "$R2_PUBLIC_BASE_URL" ]; then
            echo "R2 secrets not fully configured; skipping summary sync"
            exit 0
          fi
          node --import tsx scripts/upload-nightly-artifacts-r2.ts reports/nightly-r2-summary-sync.json summary=reports/nightly-failure-summary.json || true
      - name: Linear intake summary
        run: |
          if [ -n "$LINEAR_API_KEY" ] && [ -n "$LINEAR_PROJECT_SLUG" ]; then
            node --import tsx scripts/nightly-linear-intake.ts reports/nightly-failure-summary.json | tee reports/nightly-linear-intake.json
          else
            NIGHTLY_LINEAR_DRY_RUN=true node --import tsx scripts/nightly-linear-intake.ts reports/nightly-failure-summary.json --dry-run | tee reports/nightly-linear-intake.json
          fi
      - name: Persist nightly recurrence history to R2
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.disable_r2_upload != 'true' }}
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_HISTORY_KEY: nightly/history/linear-history.json
        run: |
          if [ -z "$R2_ACCOUNT_ID" ] || [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ] || [ -z "$R2_BUCKET" ]; then
            echo "R2 history secrets not fully configured; skipping history upload"
            exit 0
          fi
          if [ -f reports/nightly-linear-history.json ]; then
            node --import tsx scripts/nightly-history-r2.ts upload reports/nightly-linear-history.json
          fi
      - name: Upload nightly failure intake artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nightly-linear-intake-${{ github.sha }}
          path: |
            reports/nightly-evidence-links.json
            reports/nightly-failure-summary.json
            reports/nightly-linear-intake.json
            reports/nightly-linear-history.json
            notes/nightly-failure-intake.schema.md
          retention-days: 30
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "Slack webhook not configured; skipping notification"
            exit 0
          fi
          curl -X POST -H 'Content-type: application/json' --data @- "$SLACK_WEBHOOK_URL" <<'EOF'
          {
            "text": ":rotating_light: *Risoluto Nightly Pipeline Failed*\n\n*Failed jobs:* ${{ needs.fullstack-e2e.result == 'failure' && 'fullstack-e2e ' || '' }}${{ needs.visual-regression.result == 'failure' && 'visual-regression ' || '' }}${{ needs.live-provider-smoke.result == 'failure' && 'live-provider-smoke' || '' }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n*Branch:* `${{ github.ref_name }}`\n*Triggered:* ${{ github.event_name }}\n*Intake artifact:* nightly-linear-intake-${{ github.sha }}"
          }
          EOF

  # ── Nightly Quarantine Healing ───────────────────────────────────────
  # Runs quarantined tests with enforcement disabled, then updates pass
  # counts. Tests that pass 5 consecutive nightly runs are auto-healed.
  # Uses a separate QUARANTINE_TOKEN (contents:write only, no admin bypass).
  quarantine-heal:
    name: Quarantine Healing
    needs: build
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ github.event_name == 'schedule' && fromJSON('["self-hosted","linux","nightly","real-data"]') || 'ubuntu-24.04' }}
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.QUARANTINE_TOKEN || github.token }}
      - uses: ./.github/actions/restore-build
      - uses: ./.github/actions/prepare-nightly-vds
      - name: Run tests with quarantine disabled
        run: |
          mkdir -p reports
          QUARANTINE_ENFORCE=false pnpm exec vitest run --reporter=json --outputFile=reports/vitest-results.json || true
      - name: Run healing script
        run: npx tsx scripts/quarantine-heal.ts --results reports/vitest-results.json
      - name: Commit and push quarantine changes
        run: |
          if git diff --quiet quarantine.json; then
            echo "No quarantine changes to commit."
          else
            git config --local user.email "ci@risoluto.dev"
            git config --local user.name "Risoluto CI"
            git add quarantine.json
            git commit -m "chore(ci): update quarantine.json via nightly healing [skip ci]"
            git push || {
              echo "Direct push blocked by branch protection — opening PR instead."
              BRANCH="chore/quarantine-heal-$(date +%Y%m%d)"
              git checkout -b "$BRANCH"
              git push -u origin "$BRANCH"
              gh pr create \
                --title "chore(ci): nightly quarantine healing $(date +%Y-%m-%d)" \
                --body "Automated quarantine.json update from nightly healing run." \
                --base main
            }
          fi
        env:
          GH_TOKEN: ${{ secrets.QUARANTINE_TOKEN || github.token }}

  # ── Phase 6: Semantic Release (main only, after gate) ────────────────
  release:
    name: Semantic Release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
    needs: [build-and-test, integration]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.release-outputs.outputs.new_release_published }}
      new_release_version: ${{ steps.release-outputs.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/restore-build
      - name: Semantic Release
        id: release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      - name: Export release outputs
        id: release-outputs
        if: steps.release.outcome == 'success'
        run: |
          if git tag --points-at HEAD | grep -q '^v'; then
            VERSION=$(node -p "require('./package.json').version")
            echo "new_release_published=true" >> "$GITHUB_OUTPUT"
            echo "new_release_version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Phase 7: Docker Push to GHCR (after release) ───────────────────
  docker-push:
    name: Push to GHCR
    if: github.ref == 'refs/heads/main' && github.event_name != 'schedule' && needs.release.outputs.new_release_published == 'true'
    needs: [build-and-test, release]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.new_release_version }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.new_release_version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.new_release_version }}
            type=sha
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Phase 8: VDS Deploy (after Docker push) ─────────────────────────
  deploy-vds:
    name: Deploy to VDS
    needs: [release, docker-push]
    if: needs.docker-push.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            VERSION="${{ needs.release.outputs.new_release_version }}"
            IMAGE="ghcr.io/omerfarukoruc/risoluto:${VERSION}"

            cd /opt/risoluto

            # Save previous image for rollback (first-deploy guard)
            PREV_IMAGE=""
            if docker compose ps -q risoluto 2>/dev/null | grep -q .; then
              PREV_IMAGE=$(docker inspect --format='{{.Config.Image}}' "$(docker compose ps -q risoluto)")
              if echo "$PREV_IMAGE" | grep -q "^ghcr.io/"; then
                echo "$PREV_IMAGE" > /opt/risoluto/.previous-image
              else
                echo "WARN: Previous image '$PREV_IMAGE' is not a GHCR reference, rollback unavailable"
                rm -f /opt/risoluto/.previous-image
              fi
            else
              echo "First deploy: no running container, rollback unavailable"
              rm -f /opt/risoluto/.previous-image
            fi

            # Pull and deploy
            docker pull "$IMAGE"
            RISOLUTO_IMAGE="$IMAGE" docker compose up -d

            # Health check with retry (5 attempts, 10s apart)
            HEALTHY=false
            for i in 1 2 3 4 5; do
              echo "Health check attempt $i/5..."
              if curl -sf http://localhost:4000/api/v1/runtime > /dev/null 2>&1; then
                echo "Health check passed"
                HEALTHY=true
                break
              fi
              sleep 10
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "::error::Health check failed after 5 attempts"

              # Rollback if previous image is available
              if [ -f /opt/risoluto/.previous-image ]; then
                ROLLBACK_IMAGE=$(cat /opt/risoluto/.previous-image)
                echo "Rolling back to $ROLLBACK_IMAGE"
                RISOLUTO_IMAGE="$ROLLBACK_IMAGE" docker compose up -d
                sleep 5
                if curl -sf http://localhost:4000/api/v1/runtime > /dev/null 2>&1; then
                  echo "Rollback successful"
                else
                  echo "::error::Rollback also failed — manual intervention required"
                fi
              else
                echo "::error::No previous image available for rollback — manual intervention required"
              fi

              exit 1
            fi

  # ── E2E Lifecycle Test (main only, non-blocking) ─────────────────────
  # Runs the full E2E lifecycle test against real Linear, GitHub, and Codex
  # APIs. Always non-blocking — never gates docker-push or other jobs.
  # Doc-only pushes skip this via the workflow-level paths-ignore filter.
  # With cancel-in-progress: false, rapid pushes queue (up to 30 min).
  e2e-lifecycle:
    name: E2E Lifecycle
    if: github.ref == 'refs/heads/main' && github.event_name != 'schedule'
    needs: build-and-test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    continue-on-error: true
    concurrency:
      group: e2e-lifecycle
      cancel-in-progress: false
    permissions:
      contents: read
      checks: write
    env:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
      E2E_GITHUB_TOKEN: ${{ secrets.E2E_GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.E2E_GITHUB_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            dist
          key: build-${{ github.sha }}
      - name: Build Codex sandbox image
        run: docker build -f Dockerfile.sandbox -t risoluto-codex:latest .
      - name: Configure git identity for workspace commits
        run: |
          git config --global user.email "ci@risoluto.dev"
          git config --global user.name "Risoluto CI"
      - name: Decode Codex auth
        run: mkdir -p /tmp/codex-auth && echo "$CODEX_AUTH_JSON" | base64 -d > /tmp/codex-auth/auth.json
      - name: Run E2E lifecycle test
        run: npx tsx scripts/e2e-lifecycle.ts --config scripts/e2e-config.ci.yaml --skip-build --timeout 600
      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-lifecycle-report-${{ github.sha }}
          path: |
            e2e-reports/
            !e2e-reports/**/risoluto-data/
            !e2e-reports/**/artifacts/*.db
          retention-days: 14
      - name: Publish JUnit results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v3
        with:
          files: e2e-reports/**/e2e-junit.xml
          check_name: "E2E Lifecycle Results"

  # ── Gate: single required check for branch protection ────────────────
  build-and-test:
    name: build-and-test
    if: always()
    needs:
      [build, lint, test, frontend-test, knip, circular, typecheck, gitleaks, docker-build, e2e-smoke, integration-pr]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Check all required jobs passed
        run: |
          echo "build           = ${{ needs.build.result }}"
          echo "lint            = ${{ needs.lint.result }}"
          echo "test            = ${{ needs.test.result }}"
          echo "frontend-test   = ${{ needs.frontend-test.result }}"
          echo "knip            = ${{ needs.knip.result }}"
          echo "circular        = ${{ needs.circular.result }}"
          echo "typecheck       = ${{ needs.typecheck.result }}"
          echo "gitleaks        = ${{ needs.gitleaks.result }}"
          echo "docker-build    = ${{ needs.docker-build.result }}"
          echo "e2e-smoke       = ${{ needs.e2e-smoke.result }}"
          echo "integration-pr  = ${{ needs.integration-pr.result }}"

          # Jobs guarded by 'if' are skipped on schedule runs — treat as pass
          DOCKER_RESULT="${{ needs.docker-build.result }}"
          E2E_RESULT="${{ needs.e2e-smoke.result }}"
          INTEG_PR_RESULT="${{ needs.integration-pr.result }}"
          [ "$DOCKER_RESULT" = "skipped" ] && DOCKER_RESULT="success"
          [ "$E2E_RESULT" = "skipped" ] && E2E_RESULT="success"
          [ "$INTEG_PR_RESULT" = "skipped" ] && INTEG_PR_RESULT="success"

          if [ "${{ needs.build.result }}" != "success" ] ||
             [ "${{ needs.lint.result }}" != "success" ] ||
             [ "${{ needs.test.result }}" != "success" ] ||
             [ "${{ needs.frontend-test.result }}" != "success" ] ||
             [ "${{ needs.knip.result }}" != "success" ] ||
             [ "${{ needs.circular.result }}" != "success" ] ||
             [ "${{ needs.typecheck.result }}" != "success" ] ||
             [ "${{ needs.gitleaks.result }}" != "success" ] ||
             [ "$DOCKER_RESULT" != "success" ] ||
             [ "$E2E_RESULT" != "success" ] ||
             [ "$INTEG_PR_RESULT" != "success" ]; then
            echo "::error::One or more required jobs failed"
            exit 1
          fi
          echo "All required jobs passed"
