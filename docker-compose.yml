services:
  risoluto:
    build: .
    ports:
      - "${RISOLUTO_PORT:-4000}:4000"
    networks:
      - risoluto-internal
    volumes:
      - ${RISOLUTO_HOST_WORKSPACE_ROOT:-risoluto-workspaces}:/data/workspaces
      - ${RISOLUTO_HOST_ARCHIVE_DIR:-risoluto-archives}:/data/archives
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CODEX_AUTH_SOURCE_HOME:-codex-auth}:/codex-auth:ro
    environment:
      LINEAR_API_KEY: ${LINEAR_API_KEY:-}
      LINEAR_PROJECT_SLUG: ${LINEAR_PROJECT_SLUG:-}
      MASTER_KEY: ${MASTER_KEY:-}
      DATA_DIR: /data
      RISOLUTO_BIND: "0.0.0.0"
      RISOLUTO_HOST_WORKSPACE_ROOT: ${RISOLUTO_HOST_WORKSPACE_ROOT:-}
      RISOLUTO_HOST_ARCHIVE_DIR: ${RISOLUTO_HOST_ARCHIVE_DIR:-}
      RISOLUTO_CONTAINER_WORKSPACE_ROOT: /data/workspaces
      RISOLUTO_CONTAINER_ARCHIVE_DIR: /data/archives
      CODEX_AUTH_SOURCE_HOME: ${CODEX_AUTH_SOURCE_HOME:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      DISPATCH_MODE: ${DISPATCH_MODE:-local}
      DISPATCH_URL: ${DISPATCH_URL:-http://data-plane:9100/dispatch}
      DISPATCH_SHARED_SECRET: ${DISPATCH_SHARED_SECRET:-}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/v1/state').then(r=>{if(!r.ok)throw new Error(String(r.status))})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  data-plane:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile.data-plane
    networks:
      - risoluto-internal
    volumes:
      - ${RISOLUTO_HOST_WORKSPACE_ROOT:-risoluto-workspaces}:/data/workspaces
      - ${RISOLUTO_HOST_ARCHIVE_DIR:-risoluto-archives}:/data/archives
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DATA_DIR: /data
      DISPATCH_PORT: "9100"
      DISPATCH_SHARED_SECRET: ${DISPATCH_SHARED_SECRET:-}
      LINEAR_API_KEY: ${LINEAR_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      RISOLUTO_HOST_WORKSPACE_ROOT: ${RISOLUTO_HOST_WORKSPACE_ROOT:-}
      RISOLUTO_HOST_ARCHIVE_DIR: ${RISOLUTO_HOST_ARCHIVE_DIR:-}
      RISOLUTO_CONTAINER_WORKSPACE_ROOT: /data/workspaces
      RISOLUTO_CONTAINER_ARCHIVE_DIR: /data/archives
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:9100/health').then(r=>{if(!r.ok)throw new Error(String(r.status))})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  risoluto-workspaces:
  risoluto-archives:
  codex-auth:

networks:
  risoluto-internal:
    driver: bridge
