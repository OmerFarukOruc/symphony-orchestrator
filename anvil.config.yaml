# anvil.config.yaml — oh-my-anvil project configuration for Risoluto
# Full schema reference: ~/.claude/skills/oh-my-anvil/references/config-schema.md
# Generated by Unit 10 of the oh-my-anvil v3 adoption plan.

schema_version: 1

package_manager: pnpm

test_commands:
  build: "pnpm run build"
  lint: "pnpm run lint"
  typecheck: "pnpm run typecheck"
  format_check: "pnpm run format:check"
  unit: "pnpm test"
  smoke_e2e: "pnpm exec playwright test --project=smoke"
  visual_e2e: "pnpm exec playwright test --project=visual"

ui:
  always_verify: true
  viewport:
    width: 2560
    height: 1440
  frontend_paths:
    - "frontend/"
    - "src/components/"
    - "src/pages/"
    - "src/http/"
  css_patterns:
    - "**/*.css"
    - "**/*.scss"
  template_patterns:
    - "**/*.tsx"
    - "**/*.jsx"
    - "**/*-template.ts"
    - "**/*.html"

worktree:
  root: "../worktrees-{repo_name}"
  cleanup_on_merge: false

git:
  base_branch: main
  remote: origin
  branch_prefix_by_type:
    feat: "feat/"
    fix: "fix/"
    chore: "chore/"
    refactor: "refactor/"
    docs: "docs/"
    test: "test/"
    perf: "perf/"
    ci: "ci/"
  conventional_commits: true

state:
  specs_dir: ".anvil/specs"
  runs_dir: ".anvil/runs"
  legacy_dir: ".anvil/legacy"
  active_runs_dir: ".anvil/ACTIVE_RUNS"

ports:
  frontend_base: 5173
  backend_base: 4000
  hash_function: sha256
  range: 100
  collision_probe: true

output:
  plans_dir: "docs/plans"
  brainstorms_dir: "docs/brainstorms"

models:
  plan: sonnet
  review_claude: sonnet
  finalize: sonnet
  helpers: haiku

codex:
  required: true
  models:
    execute: "gpt-5.4-mini"
    review: "gpt-5.4-mini"
    audit: "gpt-5.4-mini"
  effort:
    execute: high
    review: xhigh
    audit: xhigh

ui_battery:
  layer_3_runtime: agent-browser
  layer_5_runtime: chrome-devtools-mcp
  impeccable_dynamic: true

hooks:
  pre_execute: []
  post_execute: []
  pre_push: []

caps:
  review_rounds: 6
  review_stall_threshold: 3
  audit_reopens: 2
  verify_cycles: 3
  gate_reruns: 5
  unit_retries: 2
  incoherence_threshold: 0.7
  codex_api_failures: 3

budgets:
  wall_clock_hours: 4
  codex_api_dollars: 50
